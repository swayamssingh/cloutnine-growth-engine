[build]
  command = "npm run build"
  publish = "dist"

# Explicit content-types so Google Search Console accepts the sitemap
[[headers]]
  for = "/sitemap.xml"
  [headers.values]
    Content-Type = "application/xml; charset=utf-8"
    Cache-Control = "public, max-age=3600"

[[headers]]
  for = "/robots.txt"
  [headers.values]
    Content-Type = "text/plain; charset=utf-8"
    Cache-Control = "public, max-age=3600"

# Serve static files explicitly (must come BEFORE the SPA catch-all)
[[redirects]]
  from = "/sitemap.xml"
  to = "/sitemap.xml"
  status = 200
  force = false

[[redirects]]
  from = "/robots.txt"
  to = "/robots.txt"
  status = 200
  force = false

# SPA fallback — last
[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200
